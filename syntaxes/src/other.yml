scopeName: source.spwn

patterns:
    - include: '#null'

repository:
    punctuation:
        patterns:
          - name: punctuation.terminator.spwn
            match: ;

          - name: punctuation.separator.spwn
            match: ','

          - name: punctuation.accessor.spwn
            match: '(?<!\.)\.(?!\.)'

          - name: punctuation.accessor.namespace.spwn
            match: '::'

          - name: punctuation.separator.key-value.spwn
            match: ':'

    types:
        patterns:
          - name: entity.name.type.spwn
            match: '@[a-zA-Z_]\w*|\?|\b_\b'

    assignment:
        patterns:
          - include: '#trigger-definition'
          - include: '#function-definition'

    trigger-definition:
        patterns:
          - name: entity.name.function.macro.spwn
            match: \b[a-zA-Z_]\w*(?=\s*=\s*!)

    function-definition:
        patterns:
          - name: entity.name.function.spwn
            match: \b[a-zA-Z_]\w*(?=\s*=\s*\()